name: Sync Contract (push -> contract repo)

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      WORKFLOW: ${{ secrets.WORKFLOW }}

    steps:
      - name: Checkout server repo
        uses: actions/checkout@v4
        with:
          path: server

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dotnet tools
        working-directory: server
        run: dotnet tool restore

      - name: Restore dependencies
        working-directory: server
        run: dotnet restore

      - name: Build
        working-directory: server
        run: dotnet build --no-restore

      - name: Checkout contract repo
        uses: actions/checkout@v4
        with:
          repository: daechu5657/ui-framework-contract
          ref: main
          token: ${{ env.WORKFLOW }}
          path: contract

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: contract/yarn.lock

      - name: Install contract dependencies
        working-directory: contract
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Generate contract types
        id: sync_contract
        working-directory: contract
        run: |
          SRC="../server/UiFrameworkServer/swagger.json"

          if [ ! -f "$SRC" ]; then
            echo "Source file not found: $SRC"
            exit 1
          fi

          npx openapi-typescript "$SRC" --enum -o generated/schema.ts
          yarn extract 

          if [ -n "$(git status --porcelain generated/schema.ts src/component-shared-models.ts)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.sync_contract.outputs.changed == 'true'
        working-directory: contract
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/schema.ts src/component-shared-models.ts
          git commit -m "chore: sync contract types from ui-framework-server"
          git push origin main
