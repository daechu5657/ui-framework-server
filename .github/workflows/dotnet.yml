name: Sync Contract (push -> contract repo)

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      WORKFLOW: ${{ secrets.WORKFLOW }}

    steps:
      - name: Checkout server repo
        uses: actions/checkout@v4
        with:
          path: server

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dotnet tools
        working-directory: server
        run: dotnet tool restore

      - name: Restore dependencies
        working-directory: server
        run: dotnet restore

      - name: Build
        working-directory: server
        run: dotnet build --no-restore

      - name: Checkout contract repo
        uses: actions/checkout@v4
        with:
          repository: daechu5657/ui-framework-contract
          ref: main
          token: ${{ env.WORKFLOW }}
          path: contract

      - name: Compare and sync swagger.json
        id: sync_swagger
        working-directory: .
        run: |
          SRC="server/UiFrameworkServer/swagger.json"
          DST="contract/swagger.json"

          if [ ! -f "$SRC" ]; then
            echo "Source file not found: $SRC"
            exit 1
          fi

          if [ ! -f "$DST" ] || ! diff -q "$SRC" "$DST" > /dev/null; then
            cp "$SRC" "$DST"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.sync_swagger.outputs.changed == 'true'
        working-directory: contract
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add swagger.json
          git commit -m "chore: sync swagger from ui-framework-server"
          git push origin main
