name: Sync SDK (push -> sdk repo)

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      WORKFLOW: ${{ secrets.WORKFLOW }}

    steps:
      - name: Checkout server repo
        uses: actions/checkout@v5
        with:
          path: server

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore dotnet tools
        working-directory: server
        run: dotnet tool restore

      - name: Restore dependencies
        working-directory: server
        run: dotnet restore

      - name: Build
        working-directory: server
        run: dotnet build --no-restore

      - name: Checkout sdk repo
        uses: actions/checkout@v5
        with:
          repository: daechu5657/ui-framework-sdk
          ref: main
          token: ${{ env.WORKFLOW }}
          path: sdk

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup pnpm (corepack)
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install sdk dependencies
        working-directory: sdk
        run: |
          pnpm install --frozen-lockfile

      - name: Generate sdk types
        id: sync_sdk
        working-directory: sdk
        run: |
          SRC="../server/UiFrameworkServer/swagger.json"
          PATH_CONFIG="generate-settings.json"

          if [ ! -f "$SRC" ]; then
            echo "Source file not found: $SRC"
            exit 1
          fi

          if [ ! -f "$PATH_CONFIG" ]; then
            echo "Path config not found: $PATH_CONFIG"
            exit 1
          fi

          SCHEMA_PATH=$(node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); if(!c.schema){process.exit(1)}; process.stdout.write(c.schema);" "$PATH_CONFIG")
          CONTRACT_PATH=$(node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); if(!c.contract){process.exit(1)}; process.stdout.write(c.contract);" "$PATH_CONFIG")

          echo "schema_path=$SCHEMA_PATH" >> "$GITHUB_OUTPUT"
          echo "contract_path=$CONTRACT_PATH" >> "$GITHUB_OUTPUT"

          pnpm dlx openapi-typescript "$SRC" --enum -o "$SCHEMA_PATH"
          pnpm run extract
          pnpm run prettier

          if [ -n "$(git status --porcelain "$SCHEMA_PATH" "$CONTRACT_PATH")" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.sync_sdk.outputs.changed == 'true'
        working-directory: sdk
        run: |
          SCHEMA_PATH="${{ steps.sync_sdk.outputs.schema_path }}"
          CONTRACT_PATH="${{ steps.sync_sdk.outputs.contract_path }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$SCHEMA_PATH" "$CONTRACT_PATH"
          git commit -m "chore: sync sdk types from ui-framework-server"
          git push origin main
