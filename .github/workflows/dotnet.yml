# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Sync API Contract (push -> api-contract repo)

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      WORKFLOW: ${{ secrets.WORKFLOW }}

    steps:
      - name: Checkout server repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Checkout api-contract repo
        uses: actions/checkout@v4
        with:
          repository: daechu5657/ui-framework-api-contract
          ref: main
          token: ${{ env.WORKFLOW }}
      - name: Compare and sync swagger.json
        id: sync_swagger
        run: |
          SRC="server/UiFrameworkServer/swagger.json"
          DST="api-contract/swagger.json"

          if [ ! -f "$DST" ] || ! diff -q "$SRC" "$DST" > /dev/null; then
            cp "$SRC" "$DST"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.sync_swagger.outputs.changed == 'true'
        run: |
          cd api-contract
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add swagger.json
          git commit -m "chore: sync swagger from ui-framework-server"
          git push origin main
